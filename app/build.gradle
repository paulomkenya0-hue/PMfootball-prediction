plugins {
    id 'com.android.application'
    id 'kotlin-android'
}

android {
    namespace 'com.utabiri.mechi'
    compileSdk 34

    defaultConfig {
        applicationId "com.utabiri.mechi"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = "17"
    }

    // Hakuna signingConfig maalum imewekwa -> APK ya release itatoka "unsigned"
    // isipokuwa uongeze keystore (angalia README.md sehemu ya "Kusaini APK").
}

dependencies {
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.swiperefreshlayout:swiperefreshlayout:1.1.0'
}
