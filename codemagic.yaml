workflows:
  android-apk:
    name: Utabiri Mechi - Android APK
    max_build_duration: 30

    instance_type: linux

    environment:
      java: 17

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:

      - name: Check Gradle
        script: |
          if [ ! -f "./gradlew" ]; then
            echo "Gradle wrapper haipo, natengeneza..."
            gradle wrapper --gradle-version 8.4
          fi

      - name: Give Gradle permission
        script: |
          chmod +x ./gradlew

      - name: Clean project
        script: |
          ./gradlew clean

      - name: Build Debug APK
        script: |
          ./gradlew assembleDebug

    artifacts:
      - app/build/outputs/apk/debug/*.apk

    publishing:
      email:
        recipients:
          - paulomkenya0@gmail.com
        notify:
          success: true
          failure: true
