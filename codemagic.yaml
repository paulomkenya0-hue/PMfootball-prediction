workflows:
  android-apk:
    name: Utabiri Mechi - Android APK
    max_build_duration: 30
    instance_type: linux_x2
    environment:
      groups:
        - keystore_credentials   # hiari - ondoa kama hutosaini APK (angalia README.md)
      vars:
        PACKAGE_NAME: "com.utabiri.mechi"
      java: 17
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Tengeneza Gradle wrapper
        script: |
          gradle wrapper --gradle-version 8.4
      - name: Jenga Debug APK
        script: |
          ./gradlew assembleDebug
      - name: Jenga Release APK (unsigned isipokuwa umeweka keystore)
        script: |
          ./gradlew assembleRelease
    artifacts:
      - app/build/outputs/**/*.apk
    publishing:
      email:
        recipients:
          - WEKA_EMAIL_YAKO_HAPA@example.com
        notify:
          success: true
          failure: true
